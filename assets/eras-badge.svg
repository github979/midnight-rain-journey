<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1228"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="100" cy="100" r="95" fill="url(#glowGrad)"/>

  <!-- 12-pointed star border -->
  <polygon points="100,8 108,35 118,12 120,40 135,20 130,47 150,32 138,56 162,48 142,68 168,68 142,82 168,100 140,107 162,130 136,128 148,154 122,144 124,172 104,154 100,180 96,154 76,172 78,144 52,154 64,128 38,130 50,107 22,100 48,82 22,68 48,68 38,48 62,56 50,32 70,47 65,20 80,40 82,12 92,35"
    fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5" filter="url(#softglow)"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.35" stroke-dasharray="3,4"/>

  <!-- Decorative tiny stars scattered -->
  <g fill="#c9a84c" filter="url(#softglow)" opacity="0.8">
    <!-- 4-point star function approximated as diamond shapes -->
    <polygon points="100,20 101.5,23.5 105,25 101.5,26.5 100,30 98.5,26.5 95,25 98.5,23.5" opacity="0.9"/>
    <polygon points="30,70 31,72.5 33.5,73.5 31,74.5 30,77 29,74.5 26.5,73.5 29,72.5" opacity="0.7"/>
    <polygon points="170,70 171,72.5 173.5,73.5 171,74.5 170,77 169,74.5 166.5,73.5 169,72.5" opacity="0.7"/>
    <polygon points="30,130 31,132.5 33.5,133.5 31,134.5 30,137 29,134.5 26.5,133.5 29,132.5" opacity="0.6"/>
    <polygon points="170,130 171,132.5 173.5,133.5 171,134.5 170,137 169,134.5 166.5,133.5 169,132.5" opacity="0.6"/>
    <polygon points="56,42 57,44 59,45 57,46 56,48 55,46 53,45 55,44" opacity="0.5"/>
    <polygon points="144,42 145,44 147,45 145,46 144,48 143,46 141,45 143,44" opacity="0.5"/>
    <polygon points="56,158 57,160 59,161 57,162 56,164 55,162 53,161 55,160" opacity="0.5"/>
    <polygon points="144,158 145,160 147,161 145,162 144,164 143,162 141,161 143,160" opacity="0.5"/>
  </g>

  <!-- Main center star -->
  <polygon points="100,55 104,82 115,72 106,92 130,88 112,100 130,112 106,108 115,128 104,118 100,145 96,118 85,128 94,108 70,112 88,100 70,88 94,92 85,72 96,82"
    fill="#c9a84c" opacity="0.15"/>
  <polygon points="100,60 103,80 112,72 105,88 126,85 110,97 126,110 105,107 112,122 103,115 100,138 97,115 88,122 95,107 74,110 90,97 74,85 95,88 88,72 97,80"
    fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.7" filter="url(#glow)"/>

  <!-- Text arc top -->
  <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100" fill="none"/>
  <text font-family="Georgia, serif" font-size="10" fill="#c9a84c" opacity="0.9" letter-spacing="3">
    <textPath href="#topArc" startOffset="12%">✦ THE ERAS JOURNEY ✦</textPath>
  </text>

  <!-- Text arc bottom -->
  <path id="bottomArc" d="M 32,105 A 68,68 0 0,0 168,105" fill="none"/>
  <text font-family="Georgia, serif" font-size="8.5" fill="#c9a84c" opacity="0.7" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="18%">midnight rain · becoming</textPath>
  </text>

  <!-- Center initials -->
  <text x="100" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#c9a84c" opacity="0.95" filter="url(#glow)">MR</text>
</svg>
